<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f0f2f5;
      color: #1c1e21;
    }
    h2 { font-size: 18px; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #65676b; margin-bottom: 14px; }
    .status-box {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .status-box .row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .status-box .row:last-child { margin-bottom: 0; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.ok { background: #e8f5e9; color: #2e7d32; }
    .badge.warn { background: #fff3e0; color: #e65100; }
    .badge.info { background: #e3f2fd; color: #1565c0; }
    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start { background: #1b74e4; color: #fff; width: 100%; margin-bottom: 8px; }
    .btn-stop { background: #e41b23; color: #fff; width: 100%; margin-bottom: 8px; }
    .btn-sm { background: #e4e6eb; color: #1c1e21; font-size: 12px; padding: 6px 12px; }
    .info { font-size: 12px; color: #65676b; margin: 8px 0; }
    .count-num { font-size: 28px; font-weight: 700; color: #1b74e4; }
    .count-box { text-align: center; padding: 8px 0; }
    .row-btns { display: flex; gap: 8px; }
    .row-btns button { flex: 1; }
    .url-box { font-size: 10px; color: #8a8d91; margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>Revocatus</h2>
  <div class="sub">Facebook Reaction Cleaner</div>

  <div class="status-box">
    <div class="row"><span>Status:</span><span id="statusText"><span class="badge info">Checking...</span></span></div>
    <div class="row"><span>Script:</span><span id="pageStatus"><span class="badge info">Connecting...</span></span></div>
  </div>

  <div class="count-box">
    <div class="count-num" id="countDisplay">0</div>
    <div class="sub">reactions cleaned</div>
  </div>

  <button id="actionBtn" class="btn-start">▶ Start Cleaning</button>

  <div class="row-btns">
    <button id="refreshBtn" class="btn-sm">⟳ Refresh</button>
  </div>

  <div class="info" id="infoText">Open Facebook, go to Activity Log, then tap Start.</div>
  <div class="url-box" id="urlText"></div>

  <script src="popup.js"></script>
</body>
</html>
