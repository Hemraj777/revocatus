<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f0f2f5;
      color: #1c1e21;
    }
    h2 { font-size: 18px; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #65676b; margin-bottom: 14px; }
    .status-box {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .status-box .label { color: #65676b; }
    .status-box .val { font-weight: 600; }
    .status-box .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .status-box .row:last-child { margin-bottom: 0; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.ok { background: #e8f5e9; color: #2e7d32; }
    .badge.warn { background: #fff3e0; color: #e65100; }
    .badge.err { background: #ffebee; color: #c62828; }
    .badge.info { background: #e3f2fd; color: #1565c0; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start { background: #1b74e4; color: #fff; }
    .btn-stop { background: #e41b23; color: #fff; }
    .btn-start:hover:not(:disabled) { background: #1660c4; }
    .btn-stop:hover:not(:disabled) { background: #c4181f; }
    .info { font-size: 12px; color: #65676b; margin-top: 4px; }
    .count-num { font-size: 24px; font-weight: 700; color: #1b74e4; }
    .count-box { text-align: center; padding: 8px 0; }
  </style>
</head>
<body>
  <h2>Revocatus</h2>
  <div class="sub">Facebook Reaction Cleaner</div>

  <div class="status-box" id="statusBox">
    <div class="row"><span class="label">Status</span><span class="val" id="statusText">Idle</span></div>
    <div class="row"><span class="label">Page</span><span class="val" id="pageText">Checking...</span></div>
    <div class="row"><span class="label">Mode</span><span class="val" id="modeText">-</span></div>
  </div>

  <div class="count-box">
    <div class="count-num" id="countDisplay">0</div>
    <div class="sub">reactions cleaned</div>
  </div>

  <button id="actionBtn" class="btn-start">Start Cleaning</button>

  <div class="info" id="infoText">
    Go to Facebook &gt; Activity Log &gt; Likes and Reactions, then click Start.
  </div>

  <script src="popup.js"></script>
</body>
</html>
